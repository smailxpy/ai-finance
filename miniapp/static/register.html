<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account · AI Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=8">
</head>
<body>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>

  <div class="auth-wrap">
    <div class="auth-card glass">
      <div class="auth-brand">
        <div class="auth-logo">💰</div>
        <h1>Create Account</h1>
        <p>Start tracking your finances</p>
      </div>

      <div class="auth-error" id="authError" hidden></div>

      <form id="registerForm" class="stack">
        <div>
          <label for="username">Username</label>
          <input id="username" autocomplete="username" placeholder="e.g. khalid_uz" required>
          <small style="color:var(--muted);font-size:12px">Letters, numbers, underscores · min 3 chars</small>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="new-password" placeholder="min 6 characters" required>
        </div>
        <button class="btn" type="submit" id="registerBtn">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>

  <script src="/static/common.js?v=8"></script>
  <script>
    if (_token) window.location.replace('/');

    const errEl = document.getElementById('authError');

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      const btn = document.getElementById('registerBtn');
      btnLoad(btn, true);
      try {
        const data = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        }).then(async (r) => {
          const d = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(d.detail || 'Registration failed');
          return d;
        });
        localStorage.setItem('fin_token', data.token);
        localStorage.setItem('fin_user', JSON.stringify(data.user));
        window.location.replace('/');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.hidden = false;
      } finally {
        btnLoad(btn, false);
      }
    };
  </script>
</body>
</html>
